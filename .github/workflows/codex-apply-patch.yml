name: Apply Codex Patch

on:
  push:
    branches:
      - main
    paths:
      - "_codex_push.patch"
      - ".github/workflows/codex-apply-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patch and commit
        run: |
          set -euo pipefail
          if [ ! -f _codex_push.patch ]; then
            echo "No Codex patch found; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python - <<'PY'
          from pathlib import Path

          patch = Path("_codex_push.patch")
          text = patch.read_text(encoding="utf-8")
          text = text.replace("\r\n", "\n").replace("\r", "\n")
          patch.write_text(text, encoding="utf-8", newline="\n")
          PY

          git apply --index --ignore-whitespace _codex_push.patch
          python -m py_compile scripts/update_menu.py
          python -m json.tool menu.json > /tmp/menu.json

          rm -f _codex_push.patch .github/workflows/codex-apply-patch.yml
          git add index.html menu.json scripts/update_menu.py .github/workflows/update-menu.yml _codex_push.patch .github/workflows/codex-apply-patch.yml

          if git diff --cached --quiet; then
            echo "No patch changes to commit."
            exit 0
          fi

          git commit -m "chore: update dashboard and menu automation"
          git push
